name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Install system deps required by Electron (used by electron-rebuild in postinstall)
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libsecret-1-dev libx11-dev libxkbfile-dev
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  build-linux-release:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libsecret-1-dev libx11-dev libxkbfile-dev \
            libfuse2 rpm fakeroot
      - run: npm ci
      - name: Build Linux AppImage release
        run: npm run release:linux
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage
          retention-days: 7
