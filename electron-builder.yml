appId: com.vibe-research.app
productName: Vibe Research
copyright: Copyright © 2026 Vibe Research

directories:
  output: release
  buildResources: assets

# esbuild output + @prisma/client (CJS, cannot be bundled into ESM) + native binaries.
# All other JS deps are bundled into dist/main/index.js by esbuild.
# @prisma/client must be in `dependencies` so electron-builder includes it.
files:
  - dist/**/*
  - package.json
  - node_modules/@prisma/client/**/*
  - node_modules/sql.js/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/sqlite-vec/**/*
  - node_modules/sqlite-vec-*/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - node_modules/node-addon-api/**/*
  # Exclude unnecessary files
  - '!**/*.map'
  - '!**/*.bak'
  - '!**/README.md'
  - '!**/CHANGELOG.md'
  - '!**/LICENSE'
  # Exclude @napi-rs/canvas - not needed for Electron (charts render in browser)
  - '!node_modules/@napi-rs/**/*'

# electron-builder ignores hidden dirs (starting with .) in files config.
# Use extraResources to include _prisma (copy of .prisma) outside asar,
# then afterPack will move it into asar and rename to .prisma.
extraResources:
  - from: 'node_modules/_prisma'
    to: 'prisma-backup'
    filter:
      - '**/*'
  - from: 'models'
    to: 'models'
    filter:
      - '**/*'

# Unpack native .node binaries from asar so they can be dlopen'd at runtime
asarUnpack:
  - 'dist/native/**'
  - 'node_modules/better-sqlite3/**/*.node'
  - 'node_modules/sqlite-vec-*/**/*'

extraMetadata:
  main: dist/main/index.js

mac:
  category: public.app-category.productivity
  target:
    - target: zip
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64
        - x64
  icon: assets/icon.icns
  # Only include English and Chinese language resources
  electronLanguages:
    - en
    - zh_CN

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
  electronLanguages:
    - en
    - zh_CN

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: assets/icon.png
  category: Office
  electronLanguages:
    - en
    - zh_CN

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# After packing, inject .prisma into asar from extraResources
afterPack: './scripts/after-pack.cjs'
