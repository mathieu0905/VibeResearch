appId: com.researchclaw.app
productName: ResearchClaw
copyright: Copyright © 2026 ResearchClaw

# Auto-update: publish to GitHub Releases
publish:
  provider: github
  owner: Noietch
  repo: VibeResearch

directories:
  output: release
  buildResources: assets

# esbuild output + @prisma/client (CJS, cannot be bundled into ESM) + native binaries.
# All other JS deps are bundled into dist/main/index.js by esbuild.
# @prisma/client must be in `dependencies` so electron-builder includes it.
files:
  - dist/**/*
  - package.json
  - node_modules/@prisma/client/**/*
  - node_modules/sql.js/**/*
  # Native module helpers (for sql.js and other deps)
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - node_modules/node-addon-api/**/*
  # Exclude unnecessary files
  - '!**/*.map'
  - '!**/*.bak'
  - '!**/README.md'
  - '!**/CHANGELOG.md'
  - '!**/LICENSE'
  - '!**/test/**/*'
  - '!**/tests/**/*'
  - '!**/*.test.js'
  - '!**/*.spec.js'
  - '!**/*.d.ts'
  - '!**/docs/**/*'
  - '!**/examples/**/*'
  - '!**/benchmark/**/*'
  # Exclude @napi-rs/canvas - not needed for Electron (charts render in browser)
  - '!node_modules/@napi-rs/**/*'
  # Exclude development files from node_modules
  - '!node_modules/**/*.ts'
  - '!node_modules/**/tsconfig.json'
  - '!node_modules/**/.editorconfig'
  - '!node_modules/**/.eslintrc*'
  - '!node_modules/**/.prettierrc*'
  - '!node_modules/**/Makefile'
  - '!node_modules/**/gulpfile.js'
  - '!node_modules/**/webpack.config.js'
  - '!node_modules/**/rollup.config.js'

# electron-builder ignores hidden dirs (starting with .) in files config.
# Use extraResources to include _prisma (copy of .prisma) outside asar,
# then afterPack will move it into asar and rename to .prisma.
extraResources:
  - from: 'node_modules/_prisma'
    to: 'prisma-backup'
    filter:
      - '**/*'
  - from: 'models'
    to: 'models'
    filter:
      - '**/*'

# Unpack native .node binaries from asar so they can be dlopen'd at runtime
asarUnpack:
  - 'dist/native/**'

extraMetadata:
  main: dist/main/index.js

mac:
  category: public.app-category.productivity
  target:
    - target: zip
      arch:
        - arm64
    - target: dmg
      arch:
        - arm64
  icon: assets/icon.icns
  # Only include English and Chinese language resources
  electronLanguages:
    - en
    - zh_CN

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
  signAndEditExecutable: false
  electronLanguages:
    - en
    - zh_CN

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: assets/icon.png
  category: Office
  electronLanguages:
    - en
    - zh_CN

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# After packing, inject .prisma into asar from extraResources
afterPack: './scripts/after-pack.cjs'
