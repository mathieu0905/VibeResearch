appId: com.vibe-research.app
productName: Vibe Research
copyright: Copyright © 2026 Vibe Research

directories:
  output: release
  buildResources: assets

# esbuild output + @prisma/client (CJS, cannot be bundled into ESM) + native binaries.
# All other JS deps are bundled into dist/main/index.js by esbuild.
# @prisma/client must be in `dependencies` so electron-builder includes it.
files:
  - dist/**/*
  - package.json
  - node_modules/@prisma/client/**/*

# electron-builder ignores hidden dirs (starting with .) in files config.
# Use extraResources to include _prisma (copy of .prisma) outside asar,
# then afterPack will move it into asar and rename to .prisma.
extraResources:
  - from: 'node_modules/_prisma'
    to: 'prisma-backup'
    filter:
      - '**/*'

# Unpack native .node binaries from asar so Prisma can dlopen them at runtime
asarUnpack:
  - 'dist/native/**'

extraMetadata:
  main: dist/main/index.js

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: assets/icon.icns

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: assets/icon.png
  category: Office

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# After packing, inject .prisma into asar from extraResources
afterPack: './scripts/after-pack.cjs'
